services:
  fb_frontend:
    image: fb_frontend
    build:
      context: ./front-end
      dockerfile: Dockerfile
    ports:
      - 5173:5173
    restart: unless-stopped
    environment:
      - VITE_SERVER_URL=http://127.0.0.1:3000/
    volumes:
      - ./front-end:/usr/src/app
      - /usr/src/app/node_modules

  fb_backend:
    image: fb_backend
    build:
      context: ./back-end
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./back-end:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      PORT: 3000
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      MONGO_DB_NAME: ${MONGO_DB_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER}
      SALT_ROUNDS: 10
      TOKEN_SECRET: fkdsjfkjriewuorauiuries
      TOKEN_EXPIRE_IN: 10d
      ENV: DEV
      CLIENT: http://127.0.0.1:5173,http://localhost:5173
      SERVER_URL: http://127.0.0.1:3000/
    networks:
      - app_network
  # redis:
  #   image: "redis:latest"
  #   ports:
  #     - "6379:6379"
  # mongo:
  #   image: "mongo:latest"
  #   ports:
  #     - "27017:27017"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "3000:3000"
    depends_on:
      - fb_backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
